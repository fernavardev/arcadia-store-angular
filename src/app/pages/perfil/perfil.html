<section class="container">
  <div class="page-title text-center">
    <h2>Mi perfil</h2>
    <p>Actualiza los datos de tu cuenta en Arcadia Store.</p>
  </div>

  <div *ngIf="usuarioActual; else sinSesion" class="register-section">
    <form class="register-form" [formGroup]="perfilForm" (ngSubmit)="guardarCambios()" novalidate>
      <div class="row g-4">
        <div class="col-12 col-md-6">
          <label class="form-label" for="nombre">Nombre</label>
          <input
            id="nombre"
            class="form-control"
            formControlName="nombre"
            [class.is-invalid]="campoInvalido('nombre')"
          >
          <div class="invalid-feedback">Ingresa al menos 3 caracteres.</div>
        </div>

        <div class="col-12 col-md-6">
          <label class="form-label" for="usuario">Usuario</label>
          <input
            id="usuario"
            class="form-control"
            formControlName="usuario"
            [class.is-invalid]="campoInvalido('usuario')"
          >
          <div class="invalid-feedback">Ingresa al menos 3 caracteres.</div>
        </div>

        <div class="col-12 col-md-6">
          <label class="form-label" for="email">Correo</label>
          <input
            id="email"
            type="email"
            class="form-control"
            formControlName="email"
            [class.is-invalid]="campoInvalido('email')"
          >
          <div class="invalid-feedback">Ingresa un correo válido.</div>
        </div>

        <div class="col-12 col-md-6">
          <label class="form-label" for="direccion">Dirección</label>
          <input
            id="direccion"
            class="form-control"
            formControlName="direccion"
          >
        </div>
      </div>

      <div class="register-buttons">
        <button type="submit" class="btn btn-primary">Guardar cambios</button>

        <button type="button" class="btn btn-secondary" (click)="limpiarFormulario()">
          Limpiar
        </button>
      </div>

      <div *ngIf="mensajeError" class="error-message">
        {{ mensajeError }}
      </div>

      <div *ngIf="mensajeExito" class="success-message">
        Perfil actualizado correctamente.
      </div>
    </form>
  </div>

  <ng-template #sinSesion>
    <div class="text-center register-section">
      <p>No hay una sesión activa.</p>
      <a routerLink="/login" class="btn btn-primary">Iniciar sesión</a>
    </div>
  </ng-template>
</section>
