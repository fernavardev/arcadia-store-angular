<section class="container">
  <div class="page-title text-center">
    <h2>Recuperar contraseña</h2>
    <p>Ingresa tu correo para simular la recuperación de acceso.</p>
  </div>

  <section class="register-section">
    <form class="register-form" [formGroup]="recuperarForm" (ngSubmit)="recuperarPassword()" novalidate>
      <div class="row g-4">
        <div class="col-12">
          <label for="recuperarCorreo" class="form-label">Correo electrónico</label>
          <input
            type="email"
            id="recuperarCorreo"
            class="form-control"
            placeholder="usuario@correo.com"
            formControlName="correo"
            [class.is-invalid]="campoInvalido('correo')"
          >
          <div class="invalid-feedback">
            Ingresa un correo válido.
          </div>

          <div *ngIf="error && !usuarioRecuperado" class="error-message">
            {{ error }}
          </div>
        </div>
      </div>

      <div *ngIf="usuarioRecuperado" class="row g-4 mt-2">
        <div class="col-12 col-md-6">
          <label for="nuevaPassword" class="form-label">Nueva contraseña</label>
          <input
            type="password"
            id="nuevaPassword"
            class="form-control"
            placeholder="Nueva contraseña"
            formControlName="nuevaPassword"
            [class.is-invalid]="campoInvalido('nuevaPassword')"
          >
          <div class="invalid-feedback">
            La contraseña debe tener entre 6 y 18 caracteres, mayúscula, minúscula y número.
          </div>
        </div>

        <div class="col-12 col-md-6">
          <label for="repetirNuevaPassword" class="form-label">Repetir nueva contraseña</label>
          <input
            type="password"
            id="repetirNuevaPassword"
            class="form-control"
            placeholder="Repite la nueva contraseña"
            formControlName="repetirNuevaPassword"
            [class.is-invalid]="
              campoInvalido('repetirNuevaPassword') ||
              (recuperarForm.hasError('passwordsNoCoinciden') && (controles['repetirNuevaPassword'].touched || enviado))
            "
          >
          <div class="invalid-feedback">
            Las contraseñas deben coincidir.
          </div>
        </div>

        <div *ngIf="error" class="col-12 error-message">
          {{ error }}
        </div>
      </div>

      <div class="register-buttons">
        <button type="submit" class="btn btn-primary">
          {{ usuarioRecuperado ? 'Guardar nueva contraseña' : 'Buscar cuenta' }}
        </button>

        <button type="button" class="btn btn-secondary" (click)="limpiarFormulario()">
          Limpiar
        </button>

        <a routerLink="/login" class="btn btn-secondary">Volver al login</a>
      </div>

      <div *ngIf="mensaje" class="success-message" style="display: block;">
        {{ mensaje }}
      </div>
    </form>
  </section>
</section>
