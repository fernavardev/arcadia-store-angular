<section class="container register-section">
  <div class="page-title text-center">
    <h2>Inicio de sesión</h2>
    <p>Accede a tu cuenta para continuar en Arcadia Store.</p>
  </div>

  <form class="register-form" [formGroup]="loginForm" (ngSubmit)="iniciarSesion()" novalidate>
    <div class="row g-4">
      <div class="col-12">
        <label for="correo" class="form-label">Correo electrónico</label>
        <input
          type="email"
          id="correo"
          class="form-control"
          formControlName="correo"
          [class.is-invalid]="campoInvalido('correo')"
        >
        <div class="invalid-feedback">
          Ingresa un correo válido.
        </div>
      </div>

      <div class="col-12">
        <label for="password" class="form-label">Contraseña</label>
        <input
          type="password"
          id="password"
          class="form-control"
          formControlName="password"
          [class.is-invalid]="campoInvalido('password')"
        >
        <div class="invalid-feedback">
          Ingresa la contraseña.
        </div>
      </div>
    </div>

    <div class="register-buttons">
      <button type="submit" class="btn btn-primary">Ingresar</button>

      <button type="button" class="btn btn-secondary" (click)="limpiarFormulario()">
        Limpiar
      </button>

      <a routerLink="/recuperar" class="btn btn-secondary">Recuperar contraseña</a>
    </div>

    <div *ngIf="mensajeError" class="error-message text-center">
      {{ mensajeError }}
    </div>

    <div *ngIf="errorLogin" class="error-message text-center">
      Correo o contraseña incorrectos.
    </div>
  </form>
</section>
