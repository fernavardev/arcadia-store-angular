<section class="container register-section">
  <div class="page-title text-center">
    <h2>Inicio de sesión</h2>
    <p>Accede a tu cuenta para continuar en Arcadia Store.</p>
  </div>

  <form class="register-form" (ngSubmit)="iniciarSesion()">
    <div class="row g-4">
      <div class="col-12">
        <label for="correo" class="form-label">Correo electrónico</label>
        <input
          type="email"
          id="correo"
          name="correo"
          class="form-control"
          [(ngModel)]="correo"
        >
      </div>

      <div class="col-12">
        <label for="password" class="form-label">Contraseña</label>
        <input
          type="password"
          id="password"
          name="password"
          class="form-control"
          [(ngModel)]="password"
        >
      </div>
    </div>

    <div class="register-buttons">
      <button type="submit" class="btn btn-primary">Ingresar</button>
      <a routerLink="/recuperar" class="btn btn-secondary">Recuperar contraseña</a>
    </div>

    <div *ngIf="errorLogin" class="error-message text-center">
      Correo o contraseña incorrectos.
    </div>
  </form>
</section>
