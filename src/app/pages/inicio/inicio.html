<section class="hero text-center">
  <h2>Catálogo de juegos de mesa</h2>
  <p>Explora nuestras categorías y encuentra juegos para cada tipo de jugador.</p>
</section>

<section class="category-grid">

  <article
    class="category-card"
    *ngFor="let categoria of categorias"
  >

    <img
      [src]="categoria.imagen"
      [alt]="categoria.nombre"
    >

    <h3>{{ categoria.nombre }}</h3>

    <p>
      {{ categoria.descripcion }}
    </p>

    <a [routerLink]="['/catalogo', categoria.nombre.toLowerCase()]">
      Ver categoría
    </a>

  </article>

</section>
